version: '3.8'

services:
  postgres:
    image: postgis/postgis:16-3.4
    container_name: stadsspel_postgres
    environment:
      POSTGRES_USER: stadsspel
      POSTGRES_PASSWORD: stadsspel_dev_password
      POSTGRES_DB: stadsspel
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U stadsspel"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:

  <rect x="318" y="26" width="266" height="208" rx="14" fill="#EAF9F1"/>
  <text x="451" y="56" text-anchor="middle" font-family="Segoe UI, Arial" font-size="16" fill="#1E6A4D">Beoordeling</text>

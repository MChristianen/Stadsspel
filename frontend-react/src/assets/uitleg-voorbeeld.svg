  <text x="161" y="108" text-anchor="middle" font-family="Segoe UI, Arial" font-size="14" fill="#3A5E9F">bij een landmark</text>
  <rect x="74" y="132" width="174" height="72" rx="10" fill="#C9DCFF"/>

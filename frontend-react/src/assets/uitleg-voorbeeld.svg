<svg xmlns="http://www.w3.org/2000/svg" width="900" height="260" viewBox="0 0 900 260" fill="none">
  <rect width="900" height="260" rx="16" fill="#F8FAFC"/>
  <rect x="28" y="26" width="266" height="208" rx="14" fill="#E8F1FF"/>
  <text x="161" y="56" text-anchor="middle" font-family="Segoe UI, Arial" font-size="16" fill="#244A8F">Voorbeeldopdracht</text>

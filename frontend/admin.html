<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - Stadsspel</title>
    <link rel="stylesheet" href="/css/styles.css">
    <style>
        .admin-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        
        .admin-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding: 20px;
            background: white;
            border-radius: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        
        .pending-count {
            background: #FF9800;
            color: white;
            padding: 5px 15px;
            border-radius: 20px;
            font-weight: bold;
        }
        
        .submission-card {
            background: white;
            padding: 20px;
            margin-bottom: 20px;
            border-radius: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        
        #pending-submissions {
            max-height: none;
            overflow-y: visible;
        }
        
        .submission-media {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin: 15px 0;
        }
        
        .submission-media img {
            max-width: 200px;
            max-height: 200px;
            border-radius: 5px;
            object-fit: cover;
        }
        
        .action-buttons {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }
        
        .feedback-input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 5px;
            display: none;
        }
        
        .game-controls {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
    </style>
</head>
<body>
    <div class="admin-container">
        <div class="admin-header">
            <div>
                <h1>🛠️ Admin Panel</h1>
                <p id="admin-name"></p>
            </div>
            <div style="display: flex; gap: 10px; align-items: center;">
                <span class="pending-count" id="pending-count">0</span>
                <button class="btn btn-primary" onclick="window.location.href='/session-manager.html'">
                    🎮 Terug naar Spelbeheer
                </button>
                <button class="btn btn-secondary" onclick="window.location.href='/'">
                    Terug naar App
                </button>
            </div>
        </div>

        <!-- Game Controls -->
        <div class="submission-card">
            <h2>Spel Beheer</h2>
            <div id="game-status-info" style="margin: 15px 0;"></div>
            <div class="game-controls">
                <div style="display: flex; gap: 10px; align-items: center;">
                    <input type="number" id="game-duration" placeholder="Duur (minuten)" 
                           value="120" min="1" style="width: 150px; padding: 10px;">
                    <button class="btn btn-success" id="start-game-btn">Spel Starten</button>
                </div>
                <button class="btn btn-primary" id="publish-results-btn" disabled>
                    Resultaten Publiceren
                </button>
                <button class="btn btn-secondary" id="export-btn">
                    📦 Export ZIP
                </button>
            </div>
        </div>

        <!-- Pending Submissions -->
        <div class="submission-card">
            <h2>Te Beoordelen Inzendingen</h2>
            <div id="pending-submissions"></div>
        </div>
    </div>

    <script type="module" src="/js/admin.js"></script>
</body>
</html>
